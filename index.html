<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kiosk App</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #toolbar {
      display: flex;
      background: #333;
      padding: 10px;
      height: 50px;
      box-sizing: border-box;
      align-items: center;
    }

    #toolbar button {
      margin-right: 10px;
      padding: 8px 12px;
      font-size: 14px;
      color: white;
      background: #555;
      border: none;
      cursor: pointer;
    }

    #toolbar button:hover {
      background: #777;
    }

    #content {
      padding: 10px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <button onclick="goHome()">Home</button>
    <button onclick="goBack()">Back</button>
    <button onclick="refreshPage()">Refresh</button>
  </div>

  <!-- Main content (normal page flow, no iframe) -->
  <div id="content">
    Loading...
  </div>

  <!-- Navigation logic -->
  <script>
    const HOME_URL = "https://deerfieldlibrary.org/kiosk";

    function goHome() {
      window.location.href = HOME_URL;
    }

    function goBack() {
      window.history.back();
    }

    function refreshPage() {
      window.location.reload();
    }
  </script>

  <!-- Optional: ensure kiosk always starts at home if opened blank -->
  <script>
    window.addEventListener("load", () => {
      if (!window.location.href || window.location.href === "about:blank") {
        window.location.href = HOME_URL;
      }
    });
  </script>

  <!-- Service worker (optional) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>

</body>
</html>
