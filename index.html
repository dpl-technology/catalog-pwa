<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deerfield Public Library</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      background: #333;
      padding: 10px;
      height: 50px;
      box-sizing: border-box;
      align-items: center;
    }

    #toolbar button {
      margin-right: 10px;
      padding: 8px 12px;
      font-size: 14px;
      color: white;
      background: #555;
      border: none;
      cursor: pointer;
    }

    #toolbar button:hover {
      background: #777;
    }

    #frame {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }
  </style>
</head>

<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <button onclick="goHome()">Home</button>
    <button onclick="goBack()">Back</button>
    <button onclick="refreshPage()">Refresh</button>
  </div>

  <!-- Content frame -->
  <iframe id="frame" src="https://deerfieldlibrary.org/kiosk"></iframe>

  <!-- Navigation controls -->
  <script>
    const HOME_URL = "https://deerfieldlibrary.org/kiosk";
    const frame = document.getElementById("frame");

    function goHome() {
      frame.src = HOME_URL;
    }

    function goBack() {
      try {
        frame.contentWindow.history.back();
      } catch (e) {
        console.warn("Back navigation blocked:", e);
      }
    }

    function refreshPage() {
      frame.contentWindow.location.reload();
    }
  </script>

  <!-- Link interception (IMPORTANT FOR KIOSK BEHAVIOR) -->
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const frame = document.getElementById("frame");

      document.addEventListener("click", function (e) {
        const link = e.target.closest("a");
        if (!link) return;

        const href = link.getAttribute("href");

        // Ignore invalid or non-web links
        if (!href || href.startsWith("javascript:") || href.startsWith("mailto:") || href.startsWith("tel:")) {
          return;
        }

        // Prevent new tab / window behavior
        e.preventDefault();

        // Load inside kiosk frame
        frame.src = href;
      });
    });
  </script>

  <!-- Optional service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>

</body>
</html>
