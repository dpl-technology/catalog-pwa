<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deerfield Public Library Catalog App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      background: #333;
      padding: 10px;
      height: 50px;
      box-sizing: border-box;
    }

    #toolbar button {
      margin-right: 10px;
      padding: 8px 12px;
      color: white;
      background: #555;
      border: none;
      cursor: pointer;
    }

    #frame {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }
  </style>
</head>

<body>

<div id="toolbar">
  <button onclick="goHome()">Home</button>
  <button onclick="goBack()">Back</button>
  <button onclick="refreshPage()">Refresh</button>
</div>

<iframe id="frame" src="https://deerfieldlibrary.org/kiosk"></iframe>

<script>
  const frame = document.getElementById("frame");
  const HOME_URL = "https://deerfieldlibrary.org/kiosk";

  function goHome() {
    frame.src = HOME_URL;
  }

  function goBack() {
    frame.contentWindow.history.back();
  }

  function refreshPage() {
    frame.contentWindow.location.reload();
  }

</script>

</body>
</html>
